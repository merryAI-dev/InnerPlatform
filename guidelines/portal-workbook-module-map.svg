<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1040" viewBox="0 0 1480 1040" role="img" aria-labelledby="title desc">
  <title id="title">InnerPlatform workbook import module map</title>
  <desc id="desc">Module relationship map for weekly expense workbook import, source archival, parser layer, BFF routes, Firestore, Storage, and transaction-based Drive workflow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .group-title { font: 700 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .group-note { font: 400 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .box-title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .small { font: 400 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .ui { fill: #e0f2fe; stroke: #38bdf8; }
      .logic { fill: #dcfce7; stroke: #4ade80; }
      .bff { fill: #ffedd5; stroke: #fb923c; }
      .data { fill: #ede9fe; stroke: #8b5cf6; }
      .drive { fill: #fee2e2; stroke: #f87171; }
      .box { stroke-width: 2; rx: 16; ry: 16; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .label { font: 600 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1480" height="1040" />

  <text x="40" y="48" class="group-title">Weekly Expense Workbook / Source Archive Module Map</text>
  <text x="40" y="72" class="group-note">Standard weekly sheet stays canonical. Special workbook tabs are parsed into standard rows, while raw local workbook tabs can be archived as read-only project sources.</text>

  <text x="40" y="118" class="group-title">Client / Portal UI</text>
  <text x="780" y="118" class="group-title">BFF / Persistence</text>
  <text x="40" y="690" class="group-title">Existing Transaction Drive Workflow</text>

  <rect class="box ui" x="40" y="150" width="300" height="120" />
  <text x="60" y="180" class="box-title">PortalWeeklyExpensePage.tsx</text>
  <text x="60" y="205" class="box-text">Opens Migration Wizard</text>
  <text x="60" y="225" class="box-text">Passes sheetSources from PortalStore</text>
  <text x="60" y="245" class="box-text">Keeps transaction-based Drive actions</text>

  <rect class="box ui" x="380" y="150" width="320" height="240" />
  <text x="400" y="180" class="box-title">GoogleSheetMigrationWizard.tsx</text>
  <text x="400" y="205" class="box-text">Source step: Google Sheets link + local .csv/.xls/.xlsx upload</text>
  <text x="400" y="225" class="box-text">Sheet step: classify workbook tabs</text>
  <text x="400" y="245" class="box-text">Review step: parser preview + AI suggestions</text>
  <text x="400" y="265" class="box-text">Apply step: standard save actions only</text>
  <text x="400" y="290" class="box-text">Saved local sources become read-only preview cards</text>
  <text x="400" y="310" class="box-text">Marks lastAppliedAt after successful apply</text>
  <text x="400" y="335" class="small">Key imports: local-workbook.ts, settlement-csv.ts,</text>
  <text x="400" y="352" class="small">google-sheet-migration.ts, platform-bff-client.ts</text>

  <rect class="box logic" x="40" y="320" width="300" height="160" />
  <text x="60" y="350" class="box-title">local-workbook.ts</text>
  <text x="60" y="375" class="box-text">parseLocalWorkbookFile(file)</text>
  <text x="60" y="395" class="box-text">Reads csv/xlsx/xls into workbook sheet matrices</text>
  <text x="60" y="420" class="box-text">Returns LocalWorkbookSheet[]</text>
  <text x="60" y="445" class="box-text">Wizard builds local preview from selected sheet</text>

  <rect class="box logic" x="380" y="430" width="320" height="220" />
  <text x="400" y="460" class="box-title">Parser / Mapping Layer</text>
  <text x="400" y="485" class="box-text">settlement-csv.ts</text>
  <text x="420" y="505" class="box-text">- resolve hybrid 2-row headers</text>
  <text x="420" y="523" class="box-text">- merge required docs + extra docs columns</text>
  <text x="420" y="541" class="box-text">- map drive / pending-doc aliases</text>
  <text x="400" y="570" class="box-text">google-sheet-migration.ts</text>
  <text x="420" y="590" class="box-text">- parseBudgetPlanMatrix()</text>
  <text x="420" y="608" class="box-text">- parseEvidenceRuleMatrix()</text>
  <text x="420" y="626" class="box-text">- parseCashflowProjectionMatrix()</text>

  <rect class="box logic" x="40" y="520" width="300" height="130" />
  <text x="60" y="550" class="box-title">google-sheet-import.ts</text>
  <text x="60" y="575" class="box-text">planGoogleSheetImportMerge()</text>
  <text x="60" y="595" class="box-text">Keeps protected columns (Drive link)</text>
  <text x="60" y="615" class="box-text">Merges imported standard rows into current sheet</text>

  <rect class="box data" x="40" y="730" width="300" height="180" />
  <text x="60" y="760" class="box-title">portal-store.tsx</text>
  <text x="60" y="785" class="box-text">saveExpenseSheetRows()</text>
  <text x="60" y="803" class="box-text">saveBudgetPlanRows()</text>
  <text x="60" y="821" class="box-text">saveBankStatementRows()</text>
  <text x="60" y="839" class="box-text">saveEvidenceRequiredMap()</text>
  <text x="60" y="857" class="box-text">markSheetSourceApplied()</text>
  <text x="60" y="882" class="box-text">Listens to projects/{projectId}/sheet_sources/*</text>

  <rect class="box data" x="380" y="730" width="320" height="180" />
  <text x="400" y="760" class="box-title">Firestore standard targets</text>
  <text x="400" y="785" class="box-text">projects/{projectId}/expense_sheets/{sheetId}</text>
  <text x="400" y="805" class="box-text">projects/{projectId}/bank_statements/default</text>
  <text x="400" y="825" class="box-text">projects/{projectId}/budget_summary/default</text>
  <text x="400" y="845" class="box-text">budgetEvidenceMaps/{projectId}</text>
  <text x="400" y="865" class="box-text">weekly_submission_status/*</text>

  <rect class="box ui" x="760" y="150" width="300" height="140" />
  <text x="780" y="180" class="box-title">platform-bff-client.ts</text>
  <text x="780" y="205" class="box-text">previewGoogleSheetImportViaBff()</text>
  <text x="780" y="223" class="box-text">analyzeGoogleSheetImportViaBff()</text>
  <text x="780" y="241" class="box-text">uploadProjectSheetSourceViaBff()</text>
  <text x="780" y="259" class="box-text">existing evidence-drive methods</text>

  <rect class="box bff" x="1100" y="150" width="320" height="210" />
  <text x="1120" y="180" class="box-title">server/bff/app.mjs</text>
  <text x="1120" y="205" class="box-text">POST /projects/:id/google-sheet-import/preview</text>
  <text x="1120" y="223" class="box-text">POST /projects/:id/google-sheet-import/analyze</text>
  <text x="1120" y="241" class="box-text">POST /projects/:id/sheet-sources/upload</text>
  <text x="1120" y="266" class="box-text">Also owns existing evidence-drive provision/sync/upload routes</text>
  <text x="1120" y="291" class="small">Role gate: writeCore / readCore</text>
  <text x="1120" y="308" class="small">Writes sheet_sources metadata after Storage upload</text>

  <rect class="box bff" x="760" y="340" width="300" height="140" />
  <text x="780" y="370" class="box-title">google-sheets.mjs</text>
  <text x="780" y="395" class="box-text">Reads Google Sheets link / spreadsheetId</text>
  <text x="780" y="415" class="box-text">Returns selected matrix + available sheets</text>

  <rect class="box bff" x="1100" y="390" width="320" height="120" />
  <text x="1120" y="420" class="box-title">google-sheet-migration-ai.mjs</text>
  <text x="1120" y="445" class="box-text">Suggestion only</text>
  <text x="1120" y="463" class="box-text">No auto-apply, only review guidance</text>

  <rect class="box bff" x="760" y="530" width="300" height="160" />
  <text x="780" y="560" class="box-title">project-sheet-source-storage.mjs</text>
  <text x="780" y="585" class="box-text">uploadSource()</text>
  <text x="780" y="603" class="box-text">Writes original local workbook file to Firebase Storage</text>
  <text x="780" y="621" class="box-text">Returns storagePath + downloadURL + uploadedAt</text>

  <rect class="box data" x="1100" y="550" width="320" height="160" />
  <text x="1120" y="580" class="box-title">Project source persistence</text>
  <text x="1120" y="605" class="box-text">Firestore:</text>
  <text x="1140" y="623" class="box-text">projects/{projectId}/sheet_sources/{sourceType}</text>
  <text x="1120" y="650" class="box-text">Firebase Storage:</text>
  <text x="1140" y="668" class="box-text">orgs/{tenant}/project-sheet-sources/</text>
  <text x="1140" y="686" class="box-text">{projectId}/{sourceType}/{timestamp}-{file}</text>

  <rect class="box drive" x="760" y="760" width="660" height="150" />
  <text x="780" y="790" class="box-title">Existing transaction-based evidence Drive path stays unchanged</text>
  <text x="780" y="815" class="box-text">PortalWeeklyExpensePage -> platform-bff-client evidence-drive methods -> app.mjs evidence-drive routes</text>
  <text x="780" y="835" class="box-text">-> Google Drive folder provision / upload / sync -> Firestore transactions + evidences update</text>
  <text x="780" y="860" class="box-text">Imported workbook rows must still land in standard transaction/sheet structures before Drive convenience features apply.</text>

  <path class="arrow" d="M 340 210 C 360 210, 360 210, 380 210" />
  <text x="350" y="198" class="label">open wizard</text>

  <path class="arrow" d="M 190 320 C 190 295, 390 295, 390 295" />
  <text x="210" y="308" class="label">local workbook matrices</text>

  <path class="arrow" d="M 540 390 C 540 410, 540 410, 540 430" />
  <text x="555" y="416" class="label">selected sheet matrix</text>

  <path class="arrow" d="M 540 650 C 540 690, 540 690, 540 730" />
  <text x="555" y="698" class="label">apply to standard saves</text>

  <path class="arrow" d="M 700 240 C 730 240, 730 220, 760 220" />
  <text x="716" y="208" class="label">BFF preview / analyze / source upload</text>

  <path class="arrow" d="M 1060 220 C 1080 220, 1080 220, 1100 220" />
  <text x="1078" y="208" class="label">HTTP</text>

  <path class="arrow" d="M 1220 360 C 1220 372, 1220 378, 1220 390" />
  <text x="1232" y="382" class="label">AI analyze</text>

  <path class="arrow" d="M 960 290 C 960 315, 910 315, 910 340" />
  <text x="858" y="324" class="label">Google Sheets preview</text>

  <path class="arrow" d="M 1100 260 C 1040 260, 1040 540, 1060 540" />
  <text x="1020" y="528" class="label">local source upload</text>

  <path class="arrow" d="M 1060 610 C 1080 610, 1080 610, 1100 610" />
  <text x="1074" y="598" class="label">storage result</text>

  <path class="arrow" d="M 1220 360 C 1220 450, 1220 450, 1220 550" />
  <text x="1234" y="520" class="label">metadata + previewMatrix</text>

  <path class="arrow" d="M 1100 630 C 860 630, 860 790, 340 790" />
  <text x="728" y="710" class="label">listen sheet_sources + mark applied</text>

  <path class="arrow" d="M 340 810 C 360 810, 360 810, 380 810" />
  <text x="350" y="798" class="label">standard writes</text>

  <path class="arrow" d="M 340 850 C 510 850, 510 850, 760 850" />
  <text x="470" y="838" class="label">same page keeps transaction Drive actions</text>

  <path class="arrow-soft" d="M 1220 710 C 1220 735, 1220 735, 1220 760" />
  <text x="1232" y="742" class="label">raw source archive is separate from Drive evidence sync</text>

  <path class="arrow-soft" d="M 700 540 C 730 540, 730 540, 760 540" />
  <text x="712" y="528" class="label">persist original file only for local workbook upload</text>
</svg>
