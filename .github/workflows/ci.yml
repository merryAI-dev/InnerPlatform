name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: RBAC policy verify
        run: npm run policy:verify

      - name: Production build
        run: npm run build

  product-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Portal network gate
        run: npm run phase0:portal:network-gate -- --json-out artifacts/portal-network-gate.json

      - name: Upload portal gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-network-gate
          path: artifacts/portal-network-gate.json
          if-no-files-found: error
